    <html>
    <head>
    <style>
    :root {
      --accent-primary: #00d4ff;
      --accent-secondary: #ff6b9d;
      --bg-dark: #0a0e27;
      --bg-darker: #050813;
      --bg-card: #141829;
      --text-primary: #e0e0e0;
      --text-secondary: #8a8a9e;
      --border-color: #1e2749;
      --health: #00ff88;
      --danger: #ff3366;
      --warning: #ffaa00;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      margin-bottom: 30px;
      border-bottom: 2px solid var(--accent-primary);
      padding-bottom: 15px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .header-meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 20px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    .tab-btn:hover {
      color: var(--accent-primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .servers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .server-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .server-card:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
      transform: translateY(-2px);
    }

    .server-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 8px;
    }

    .server-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-primary);
      flex: 1;
      word-break: break-word;
    }

    .location-badge {
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent-primary);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .server-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .players-bar {
      width: 100%;
      height: 6px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }

    .players-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .game-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0, 212, 255, 0.05);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
    }

    .detail-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    .mode-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mode-team {
      background: rgba(255, 107, 157, 0.2);
      color: var(--accent-secondary);
    }

    .mode-survival {
      background: rgba(0, 255, 136, 0.2);
      color: var(--health);
    }

    .mode-invasion {
      background: rgba(255, 170, 0, 0.2);
      color: var(--warning);
    }

    .mode-modding {
      background: rgba(100, 150, 255, 0.2);
      color: #6496ff;
    }

    .status-open {
      color: var(--health);
    }

    .status-closed {
      color: var(--danger);
    }

    .criminal-indicator {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }

    .criminal-high {
      background: rgba(255, 51, 102, 0.2);
      color: var(--danger);
    }

    .criminal-low {
      background: rgba(255, 255, 0, 0.1);
      color: var(--text-secondary);
    }

    .server-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .action-btn {
      flex: 1;
      padding: 8px 12px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(0, 212, 255, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state p {
      margin: 10px 0;
      font-size: 16px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 8px;
    }

    .filter-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .filter-btn.active {
      background: rgba(0, 212, 255, 0.2);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    </style>
    </head>
    <body>
    <div class="container">
      <div id="spectateModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:#141829;border:1px solid #1e2749;border-radius:10px;width:90vw;max-width:900px;padding:20px;position:relative;">
        <button onclick="closeSpectate()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:#e0e0e0;font-size:20px;cursor:pointer;">✕</button>
        <h3 id="spectateTitle" style="color:#00d4ff;margin-bottom:12px;"></h3>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <canvas id="minimapCanvas" width="500" height="500" style="background:#050813;border:1px solid #1e2749;border-radius:6px;flex-shrink:0;max-width:100%;"></canvas>
          <div id="spectateInfo" style="flex:1;min-width:180px;font-size:13px;"></div>
        </div>
        <div id="spectateStatus" style="color:#8a8a9e;font-size:12px;margin-top:10px;"></div>
      </div>
    </div>
      <div class="header">
        <h1>⚔ Starblast Servers</h1>
        <div class="header-meta">
          <span id="last-update">Fetching data...</span>
          <span id="total-players">Players: Loading...</span>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('open')">Open Games</button>
        <button class="tab-btn" onclick="switchTab('closed')">Closed Games</button>
      </div>

      <div id="open" class="tab-content active">
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">Open Games</span>
            <span class="stat-value" id="open-count">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Total Players</span>
            <span class="stat-value" id="open-players">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Servers</span>
            <span class="stat-value" id="open-servers">0</span>
          </div>
        </div>
        <div class="servers-grid" id="open-games"></div>
      </div>

      <div id="closed" class="tab-content">
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">Closed Games</span>
            <span class="stat-value" id="closed-count">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Total Players</span>
            <span class="stat-value" id="closed-players">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Servers</span>
            <span class="stat-value" id="closed-servers">0</span>
          </div>
        </div>
        <div class="servers-grid" id="closed-games"></div>
      </div>
    </div>

    <script>
    const API_URL = 'https://starblast.dankdmitron.dev/api/simstatus.json';

    async function fetchServers() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        renderServers(data);
        document.getElementById('last-update').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        console.error('Error fetching servers:', error);
        document.getElementById('open-games').innerHTML = '<div class="empty-state"><p>Failed to load server data</p></div>';
      }
    }

    function renderServers(serverData) {
      const openGames = [];
      const closedGames = [];
      let totalPlayers = 0;
      const serverLocations = new Set();

      serverData.forEach(server => {
        serverLocations.add(server.location);
        server.systems.forEach(game => {
          totalPlayers += game.players;
          const gameObj = { ...game, location: server.location, server_address: server.address };
          if (game.open) {
            openGames.push(gameObj);
          } else {
            closedGames.push(gameObj);
          }
        });
      });

      renderTab('open', openGames, serverLocations.size);
      renderTab('closed', closedGames, serverLocations.size);
      document.getElementById('total-players').textContent = `Total Players: ${totalPlayers}`;
    }

    function renderTab(tabName, games, serverCount) {
      const container = document.getElementById(`${tabName}-games`);
      const countEl = document.getElementById(`${tabName}-count`);
      const playersEl = document.getElementById(`${tabName}-players`);
      const serversEl = document.getElementById(`${tabName}-servers`);

      countEl.textContent = games.length;
      serversEl.textContent = serverCount;

      const totalPlayers = games.reduce((sum, g) => sum + g.players, 0);
      playersEl.textContent = totalPlayers;

      if (games.length === 0) {
        container.innerHTML = '<div style="grid-column: 1/-1;"><div class="empty-state"><p>No games found</p></div></div>';
        return;
      }

      container.innerHTML = games.map(game => `
        <div class="server-card">
          <div class="server-header">
            <div class="server-name">${escapeHtml(game.name)}</div>
            <div class="location-badge">${game.location}</div>
          </div>
          
          <div class="server-info">
            <div class="info-item">
              <span class="info-label">Players</span>
              <span class="info-value">${game.players}</span>
              <div class="players-bar">
                <div class="players-fill" style="width: ${Math.min(game.players * 3, 100)}%"></div>
              </div>
            </div>
            <div class="info-item">
              <span class="info-label">Status</span>
              <span class="info-value ${game.open ? 'status-open' : 'status-closed'}">
                ${game.open ? '● OPEN' : '● CLOSED'}
              </span>
            </div>
          </div>

          <div class="game-details">
            <div class="detail-row">
              <span class="detail-label">Mode</span>
              <span class="mode-badge mode-${game.mode}">${game.mode.toUpperCase()}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Runtime</span>
              <span class="detail-value">${formatTime(game.time)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Server ID</span>
              <span class="detail-value">#${game.id}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Criminal Activity</span>
              <span class="criminal-indicator ${game.criminal_activity > 3 ? 'criminal-high' : 'criminal-low'}">
                ${game.criminal_activity > 0 ? '⚠ ' + game.criminal_activity : 'None'}
              </span>
            </div>
            ${game.mod_id ? `
            <div class="detail-row">
              <span class="detail-label">Mod</span>
              <span class="detail-value">${game.mod_id}</span>
            </div>
            ` : ''}
          </div>

          <div class="server-actions">
            <button class="action-btn" onclick="copyToClipboard('${game.server_address}')">Copy IP</button>
  <a class="action-btn" href="https://starblast.io/#${game.id}@${game.server_address}" target="_blank" style="text-align:center;text-decoration:none;">Join</a>
  <button class="action-btn" onclick="spectate(${game.id}, '${escapeHtml(game.name)}', '${game.mode}')">Spectate</button>        </div>
        </div>
      `).join('');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      if (hours > 0) return `${hours}h ${mins}m`;
      return `${mins}m`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Server address copied!');
      });
    }

  let spectateWS = null;
  let spectateAnimFrame = null;
  let spectateShips = [];
  let spectateTeams = [];
  let spectateMode = '';

  function spectate(gameId, gameName, gameMode) {
    document.getElementById('spectateModal').style.display = 'flex';
    document.getElementById('spectateTitle').textContent = '📡 ' + gameName;
    document.getElementById('spectateInfo').innerHTML = '';
    document.getElementById('spectateStatus').textContent = 'Connecting...';
    spectateShips = [];
    spectateTeams = [];
    spectateMode = gameMode;

    if (spectateWS) spectateWS.close();
    if (spectateAnimFrame) cancelAnimationFrame(spectateAnimFrame);

    try {
       spectateWS = new WebSocket('wss://starblast.dankdmitron.dev/'); 
      spectateWS.onopen = () => {
        spectateWS.send(JSON.stringify({ name: 'spectate', system_id: gameId }));
        document.getElementById('spectateStatus').textContent = 'Connected — receiving data...';
        drawMinimap();
      };
      spectateWS.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.name === 'this_system') {
            spectateTeams = msg.teams || [];
            updateSpectateInfo(msg);
          } else if (msg.name === 'update') {
            if (msg.ships) spectateShips = msg.ships;
            if (msg.teams) { spectateTeams = msg.teams; updateSpectateInfo(msg); }
          }
        } catch(e) {}
      };
      spectateWS.onerror = () => {
        document.getElementById('spectateStatus').textContent = 'Connection error.';
      };
      spectateWS.onclose = () => {
        document.getElementById('spectateStatus').textContent = 'Disconnected.';
      };
    } catch(e) {
      document.getElementById('spectateStatus').textContent = 'WebSocket not supported.';
    }
  }

  const TEAM_COLORS = ['#00ff88','#00d4ff','#ff3366','#ffaa00','#cc44ff','#ff8c00'];
  const TEAM_NAMES  = ['Green','Blue','Red','Orange','Purple','Yellow'];

  function updateSpectateInfo(msg) {
    const teams = msg.teams || spectateTeams;
    if (!teams || !teams.length) return;
    let html = '<div style="display:flex;flex-direction:column;gap:10px;">';
    teams.forEach((t, i) => {
      const col = TEAM_COLORS[i] || '#e0e0e0';
      const name = (t.name || TEAM_NAMES[i] || 'Team ' + (i+1));
      html += `<div style="border:1px solid ${col};border-radius:6px;padding:10px;">
        <div style="color:${col};font-weight:700;font-size:15px;margin-bottom:6px;">${escapeHtml(name)}</div>
        ${t.score != null ? `<div>Score: <b style="color:${col}">${t.score}</b></div>` : ''}
        ${t.level != null ? `<div>Level: <b style="color:${col}">${t.level}</b></div>` : ''}
        ${t.gems  != null ? `<div>Gems: <b style="color:${col}">${t.gems}</b></div>` : ''}
        ${t.ecp_count != null ? `<div>ECPs: <b style="color:${col}">${t.ecp_count}</b></div>` : ''}
      </div>`;
    });
    html += '</div>';
    document.getElementById('spectateInfo').innerHTML = html;
  }

  function drawMinimap() {
    const canvas = document.getElementById('minimapCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050813';
    ctx.fillRect(0, 0, W, H);

    // Draw grid lines
    ctx.strokeStyle = 'rgba(0,212,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 50) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Ships: positions come in as x/y in game units (~-500 to 500)
    spectateShips.forEach(ship => {
      const x = ((ship.x / 1000) + 0.5) * W;
      const y = ((ship.y / 1000) + 0.5) * H;
      const teamIdx = ship.team != null ? ship.team : -1;
      const col = teamIdx >= 0 ? (TEAM_COLORS[teamIdx] || '#ffffff') : '#ffffff';

      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    if (spectateWS && spectateWS.readyState === WebSocket.OPEN) {
      spectateAnimFrame = requestAnimationFrame(drawMinimap);
    }
  }

  function closeSpectate() {
    document.getElementById('spectateModal').style.display = 'none';
    if (spectateWS) { spectateWS.close(); spectateWS = null; }
    if (spectateAnimFrame) { cancelAnimationFrame(spectateAnimFrame); spectateAnimFrame = null; }
    spectateShips = [];
  }

    fetchServers();
    setInterval(fetchServers, 30000);
    </script>
    </body>
    </html>
